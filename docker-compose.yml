
services:
  # ─── MySQL database ─────────────────────────────────────────────────────────
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-newsportal}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Express / Prisma API ────────────────────────────────────────────────────
  backend:
    # Prebuilt / tagged name (local `docker compose build` tags this image too).
    image: hasan55/newsportal_backend:v1
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: mysql://root:${DB_ROOT_PASSWORD}@db:3306/${DB_NAME:-newsportal}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      PUBLIC_MEDIA_BASE: ${PUBLIC_MEDIA_BASE:-}
    ports:
      - "${BACKEND_HOST_PORT:-5000}:5000"
    volumes:
      - uploads_data:/app/uploads

  # ─── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    image: hasan55/newsportal_frontend:v1
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api/v1}
        NEXT_PUBLIC_FRONTEND_URL: ${NEXT_PUBLIC_FRONTEND_URL:-http://localhost:3000}
        BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:5000}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3000
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:5000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api/v1}
      NEXT_PUBLIC_FRONTEND_URL: ${NEXT_PUBLIC_FRONTEND_URL:-http://localhost:3000}
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"

volumes:
  db_data:
  uploads_data:
